<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="bowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2f1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Decorative ring -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>

  <!-- Bowl body -->
  <path d="M136 260 Q136 340 256 340 Q376 340 376 260 Z" fill="url(#bowl)" opacity="0.95"/>
  <!-- Bowl rim -->
  <ellipse cx="256" cy="260" rx="120" ry="16" fill="white"/>
  <!-- Bowl base -->
  <ellipse cx="256" cy="340" rx="50" ry="8" fill="rgba(255,255,255,0.7)"/>

  <!-- Steam lines -->
  <path d="M200 230 Q195 210 205 190" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M256 220 Q251 200 261 175" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M312 230 Q307 210 317 190" stroke="white" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Question mark -->
  <text x="256" y="220" text-anchor="middle" font-size="120" font-weight="900" font-family="Arial, sans-serif" fill="#0d9488">?</text>

  <!-- Sparkle dots -->
  <circle cx="160" cy="140" r="6" fill="rgba(255,255,255,0.8)"/>
  <circle cx="360" cy="120" r="4" fill="rgba(255,255,255,0.6)"/>
  <circle cx="120" cy="200" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="390" cy="180" r="5" fill="rgba(255,255,255,0.7)"/>
</svg>
