name: Build macOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-app:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS DMG
        run: pnpm tauri build --bundles dmg

      - name: Package DMG artifact
        run: |
          mkdir -p artifacts
          VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          DMG_PATH="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f | head -n 1)"

          if [ -z "$DMG_PATH" ]; then
            echo "No .dmg artifact found"
            exit 1
          fi

          cp "$DMG_PATH" "artifacts/sileat-${VERSION}-macos-${SHORT_SHA}.dmg"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          DMG_PATH="$(find artifacts -maxdepth 1 -name '*.dmg' -type f | head -n 1)"

          gh release create "sileat-v${VERSION}" \
            "$DMG_PATH" \
            --target "$GITHUB_SHA" \
            --title "今天吃什么 macOS ${VERSION} ${SHORT_SHA}" \
            --notes "Automated macOS DMG build for commit ${GITHUB_SHA}."
